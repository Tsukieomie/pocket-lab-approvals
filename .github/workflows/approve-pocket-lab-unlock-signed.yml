name: Approve Pocket Lab Unlock Signed

on:
  workflow_dispatch:
    inputs:
      pdf_sha256:
        description: Exact Pocket Lab PDF SHA-256 displayed by iSH/Perplexity
        required: true
        type: string
      nonce:
        description: One-time nonce displayed by iSH/Perplexity
        required: true
        type: string
      valid_minutes:
        description: Approval lifetime in minutes, max 5
        required: true
        default: "5"
        type: choice
        options: ["1", "3", "5"]
      confirm:
        description: Type APPROVE to create signed short-lived unlock approval
        required: true
        type: string

permissions:
  contents: write

env:
  EXPECTED_PDF_SHA256: "38c4871e12c75f12fc0c9603b92879e79454c87c6edf2a9adabfd00dff134134"
  APPROVAL_PUBKEY_SHA256: "84758a2db2bd28f4ca900de4a2ec2eddea024287ba26dea31ea328980d9da6ab"

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate input
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirm }}" = "APPROVE"
          test "${{ inputs.pdf_sha256 }}" = "$EXPECTED_PDF_SHA256"
          case "${{ inputs.valid_minutes }}" in 1|3|5) ;; *) exit 2 ;; esac
      - name: Install signing key
        shell: bash
        env:
          APPROVAL_SIGNING_KEY_SECP256K1_B64: ${{ secrets.APPROVAL_SIGNING_KEY_SECP256K1_B64 }}
        run: |
          set -euo pipefail
          test -n "$APPROVAL_SIGNING_KEY_SECP256K1_B64"
          printf '%s' "$APPROVAL_SIGNING_KEY_SECP256K1_B64" | base64 -d > approval_signing_key.pem
          chmod 600 approval_signing_key.pem
      - name: Create and sign approval
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p approvals
          APPROVED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EXPIRES_AT=$(date -u -d "+${{ inputs.valid_minutes }} minutes" +%Y-%m-%dT%H:%M:%SZ)
          NONCE_SHA=$(printf '%s' '${{ inputs.nonce }}' | sha256sum | awk '{print $1}')
          cat > approvals/current.json <<JSON
          {
            "schema": "pocket_lab_signed_approval_v1",
            "approved": true,
            "pdf_sha256": "${{ inputs.pdf_sha256 }}",
            "nonce_sha256": "$NONCE_SHA",
            "approved_by": "${{ github.actor }}",
            "approved_at_utc": "$APPROVED_AT",
            "expires_at_utc": "$EXPIRES_AT",
            "repo": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "approval_pubkey_sha256": "$APPROVAL_PUBKEY_SHA256",
            "signature_algorithm": "ECDSA-secp256k1-SHA256"
          }
          JSON
          python3 - <<'PY'
          import json
          p='approvals/current.json'
          o=json.load(open(p))
          open(p,'w').write(json.dumps(o, sort_keys=True, separators=(',',':'))+'\n')
          PY
          openssl dgst -sha256 -sign approval_signing_key.pem -out approvals/current.json.sig approvals/current.json
          sha256sum approvals/current.json > approvals/current.json.sha256
      - name: Commit signed approval files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add approvals/current.json approvals/current.json.sig approvals/current.json.sha256
          git commit -m "Signed Pocket Lab unlock approval for ${{ inputs.pdf_sha256 }}" || true
          git push origin HEAD:main
